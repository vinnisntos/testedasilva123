name: Deploy Automático para AWS

on:
  push:
    branches: [ "main" ] # Se a sua branch principal chamar "master", mude aqui

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Puxar o código do repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o ambiente .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 3. Publicar o projeto (Build)
      run: dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish

    - name: 4. Enviar os arquivos para a AWS (Substitui o seu SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        source: "publish*"
        target: "/var/www/vinnisantos"
        strip_components: 1

    - name: 5. Reiniciar o serviço do ASP.NET lá no Ubuntu
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          sudo systemctl restart vinnisantos.service